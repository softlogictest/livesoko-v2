name: Build LiveSoko Sync APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set Android SDK path
      run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

    - name: Build with Gradle
      run: gradle assembleDebug
      working-directory: ./livesoko-sync-native

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: livesoko-sync-apk
        path: livesoko-sync-native/app/build/outputs/apk/debug/app-debug.apk
