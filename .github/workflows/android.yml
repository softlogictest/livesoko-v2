name: Build LiveSoko Sync APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Generate Wrapper
      run: gradle wrapper
      working-directory: ./livesoko-sync-native

    - name: Build with Gradle
      run: ./gradlew assembleDebug --info --stacktrace
      working-directory: ./livesoko-sync-native

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: livesoko-sync-apk
        path: livesoko-sync-native/app/build/outputs/apk/debug/app-debug.apk
