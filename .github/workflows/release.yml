name: Build and Release Android APK

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x livesoko-sync-native/gradlew

      - name: Build APK
        working-directory: ./livesoko-sync-native
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK for Release
        run: mv livesoko-sync-native/app/build/outputs/apk/debug/app-debug.apk livesoko-sync-native/app/build/outputs/apk/debug/livesoko-sync.apk

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Release
          body: "Automatically generated release for the LiveSoko Companion App."
          files: livesoko-sync-native/app/build/outputs/apk/debug/livesoko-sync.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
